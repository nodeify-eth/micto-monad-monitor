<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Monad Validator Monitor - Real-time validator status dashboard">
    <title>Monad Validator Monitor</title>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%23836EF9' d='M12 3c-2.599 0-9 6.4-9 9s6.401 9 9 9s9-6.401 9-9s-6.401-9-9-9m-1.402 14.146c-1.097-.298-4.043-5.453-3.744-6.549s5.453-4.042 6.549-3.743c1.095.298 4.042 5.453 3.743 6.549c-.298 1.095-5.453 4.042-6.549 3.743'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <header class="header" role="banner">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon" aria-hidden="true">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Monad logo">
                        <path fill="#836EF9" d="M12 3c-2.599 0-9 6.4-9 9s6.401 9 9 9s9-6.401 9-9s-6.401-9-9-9m-1.402 14.146c-1.097-.298-4.043-5.453-3.744-6.549s5.453-4.042 6.549-3.743c1.095.298 4.042 5.453 3.743 6.549c-.298 1.095-5.453 4.042-6.549 3.743"/>
                    </svg>
                </div>
                <div class="logo-text-group">
                    <span class="logo-text">MONAD</span>
                    <span class="logo-subtext">Validator Monitor</span>
                </div>
            </div>
            <div class="header-right">
                <span class="connection-indicator" role="status" aria-live="polite">
                    <span id="connection-dot" class="connection-dot connected" aria-hidden="true"></span>
                    <span id="connection-status">Connected</span>
                </span>
            </div>
        </div>
    </header>

    <!-- Summary Bar -->
    <div id="summary-bar" class="summary-bar">
        <div class="summary-stat">
            <span class="summary-stat-value" id="total-validators">-</span>
            <span class="summary-stat-label">Validators</span>
        </div>
        <div class="summary-stat">
            <span class="summary-stat-value summary-stat--active" id="active-count">-</span>
            <span class="summary-stat-label">Active</span>
        </div>
        <div class="summary-stat">
            <span class="summary-stat-value summary-stat--warning" id="warning-count">-</span>
            <span class="summary-stat-label">Warnings</span>
        </div>
        <div class="summary-stat">
            <span class="summary-stat-value summary-stat--critical" id="critical-count">-</span>
            <span class="summary-stat-label">Critical</span>
        </div>
        <div class="summary-divider"></div>
        <div class="summary-stat">
            <span class="summary-stat-value" id="monitor-uptime">--</span>
            <span class="summary-stat-label">Uptime</span>
        </div>
    </div>

    <!-- Main Content -->
    <div class="dashboard">
        <main id="main-content" class="main-content" role="main">
            <!-- Validator Status Cards Container -->
            <div id="validators-container" class="validators-container" role="list" aria-label="Validator status cards">
            </div>
        </main>
    </div>

    <!-- Footer -->
    <footer class="footer" role="contentinfo">
        <div class="footer-content">
            <span class="refresh-badge" aria-label="Auto-refresh interval">Auto-refresh: 5s</span>
            <span class="footer-credit">Made by MictoNode</span>
        </div>
    </footer>

    <!-- Validator Card Template -->
    <template id="validator-card-template">
        <div class="validator-card" tabindex="0" role="listitem">
            <div class="card-accent"></div>

            <div class="card-header">
                <div class="validator-info">
                    <span class="validator-indicator" aria-hidden="true"></span>
                    <span class="validator-name"></span>
                    <span class="validator-network-badge" aria-label="Network"></span>
                </div>
                <span class="validator-status-badge" role="status"></span>
            </div>

            <div class="card-metrics" role="group" aria-label="Validator metrics">
                <div class="metric">
                    <span class="metric-label">Height</span>
                    <span class="metric-value metric-height"></span>
                </div>
                <div class="metric">
                    <span class="metric-label">Peers</span>
                    <span class="metric-value metric-peers"></span>
                </div>
                <div class="metric">
                    <span class="metric-label">Uptime</span>
                    <span class="metric-value metric-uptime"></span>
                </div>
                <div class="metric">
                    <span class="metric-label">Fails</span>
                    <span class="metric-value metric-fails"></span>
                </div>
            </div>

            <div class="card-resources">
                <div class="resource-gauge" data-resource="cpu">
                    <div class="gauge-header">
                        <span class="gauge-label">CPU</span>
                        <span class="gauge-value">--</span>
                    </div>
                    <div class="gauge-bar"><div class="gauge-fill"></div></div>
                </div>
                <div class="resource-gauge" data-resource="memory">
                    <div class="gauge-header">
                        <span class="gauge-label">MEM</span>
                        <span class="gauge-value">--</span>
                    </div>
                    <div class="gauge-bar"><div class="gauge-fill"></div></div>
                </div>
                <div class="resource-gauge" data-resource="disk">
                    <div class="gauge-header">
                        <span class="gauge-label">DISK</span>
                        <span class="gauge-value">--</span>
                    </div>
                    <div class="gauge-bar"><div class="gauge-fill"></div></div>
                </div>
            </div>

            <div class="card-details">
                <div class="details-grid">
                    <div class="detail-item">
                        <span class="detail-label">Proposals</span>
                        <span class="detail-value detail-proposals">--</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Finalized</span>
                        <span class="detail-value detail-finalized">--</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Timeouts</span>
                        <span class="detail-value detail-timeouts">--</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Round Diff</span>
                        <span class="detail-value detail-round-diff">--</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">RPC</span>
                        <span class="detail-value detail-rpc">--</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">TPS</span>
                        <span class="detail-value detail-tps">--</span>
                    </div>
                </div>
                <div class="detail-triedb" hidden>
                    <div class="gauge-header">
                        <span class="gauge-label">TrieDB</span>
                        <span class="gauge-value detail-triedb-value">--</span>
                    </div>
                    <div class="gauge-bar gauge-bar--wide"><div class="gauge-fill detail-triedb-fill"></div></div>
                </div>
                <div class="detail-warnings" hidden>
                    <span class="detail-label">Alerts</span>
                    <div class="warnings-list"></div>
                </div>
            </div>

            <div class="card-footer">
                <span class="last-check-label">Last check:</span>
                <span class="last-check-time"></span>
            </div>
        </div>
    </template>

    <script src="app.js"></script>
</body>
</html>
